<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FilmVault</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 20px;
      color: #e50914;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    select, input, button {
      padding: 9px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      font-size: 14px;
      background: #1a1a1a;
      color: #f0f0f0;
    }

    button {
      background: #e50914;
      border-color: #e50914;
      cursor: pointer;
    }

    button:hover { background: #b0070f; }

    input { width: 220px; }
    input::placeholder { color: #777; }

    #status {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 16px;
      min-height: 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }

    .section-title {
      font-size: 18px;
      margin-bottom: 14px;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }

    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: #111;
    }

    .card-body { padding: 10px; }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .card-meta {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .btn-fav {
      width: 100%;
      padding: 6px;
      font-size: 12px;
      border-radius: 4px;
      background: #222;
      border: 1px solid #444;
      color: #f0f0f0;
      cursor: pointer;
    }

    .btn-fav:hover { background: #e50914; border-color: #e50914; }

    .fav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }

    .fav-thumb {
      width: 36px;
      height: 54px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #111;
    }

    .fav-info { flex: 1; min-width: 0; }
    .fav-title { font-size: 13px; font-weight: 600; }
    .fav-year  { font-size: 12px; color: #888; }

    .btn-remove {
      padding: 5px 10px;
      font-size: 12px;
      background: #222;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-remove:hover { background: #e50914; border-color: #e50914; color: #fff; }

    .empty-msg { color: #666; font-size: 13px; padding: 10px 0; }
  </style>
</head>
<body>

  <h1>🎬 FilmVault</h1>

  <div class="controls">
    <select id="type-select">
      <option value="popular">Populaires</option>
      <option value="top_rated">Mieux notés</option>
      <option value="upcoming">À venir</option>
      <option value="now_playing">En salle</option>
    </select>
    <button onclick="loadMovies()">Charger</button>

    <input type="text" id="search-input" placeholder="Rechercher un film...">
    <button onclick="searchMovies()">Rechercher</button>
  </div>

  <div id="status">Clique sur "Charger" pour voir les films.</div>

  <div class="layout">

    <div>
      <div class="section-title">Films</div>
      <div class="movies-grid" id="movies-grid"></div>
    </div>

    <div>
      <div class="section-title">Mes favoris</div>
      <div id="fav-list"></div>
    </div>

  </div>

  <script>
    const API = 'http://localhost:8000';
    const IMG = 'https://image.tmdb.org/t/p/w200';

    async function loadMovies() {
      const type = document.getElementById('type-select').value;
      setStatus('Chargement...');
      try {
        const res  = await fetch(`${API}/movies?type=${type}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur serveur');
        displayMovies(data.results || []);
        setStatus(`${(data.results || []).length} film(s) chargé(s).`);
      } catch (e) {
        setStatus('Erreur : ' + e.message);
      }
    }

    async function searchMovies() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) return;
      setStatus('Recherche en cours...');
      try {
        const res  = await fetch(`${API}/movies/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur serveur');
        displayMovies(data.results || []);
        setStatus(`${(data.results || []).length} résultat(s) pour "${query}".`);
      } catch (e) {
        setStatus('Erreur : ' + e.message);
      }
    }

    function displayMovies(movies) {
      const grid = document.getElementById('movies-grid');
      grid.innerHTML = '';

      if (!movies.length) {
        grid.innerHTML = '<p class="empty-msg">Aucun film trouvé.</p>';
        return;
      }

      movies.forEach(movie => {
        const poster = movie.poster_path
          ? `<img src="${IMG}${movie.poster_path}" alt="${esc(movie.title)}">`
          : `<img src="https://placehold.co/150x225/1a1a1a/666?text=N/A" alt="Pas d'image">`;

        const year = movie.release_date ? movie.release_date.slice(0, 4) : '—';
        const note = typeof movie.vote_average === 'number' ? movie.vote_average.toFixed(1) : '—';

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          ${poster}
          <div class="card-body">
            <div class="card-title">${esc(movie.title || 'Sans titre')}</div>
            <div class="card-meta">⭐ ${note} · ${year}</div>
            <button class="btn-fav" onclick="addFavorite(${movie.id}, '${escJs(movie.title)}', '${escJs(movie.poster_path || '')}', '${year}')">
              + Favori
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    async function addFavorite(id, title, poster_path, year) {
      try {
        const res  = await fetch(`${API}/favorites`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, title, poster_path, year })
        });
        const data = await res.json();
        if (res.status === 409) { setStatus('Ce film est déjà dans les favoris.'); return; }
        if (!res.ok) throw new Error(data.error || 'Erreur ajout');
        setStatus(`"${title}" ajouté aux favoris.`);
        loadFavorites();
      } catch (e) {
        setStatus('Erreur : ' + e.message);
      }
    }

    async function removeFavorite(id) {
      try {
        const res  = await fetch(`${API}/favorites/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur suppression');
        setStatus('Favori supprimé.');
        loadFavorites();
      } catch (e) {
        setStatus('Erreur : ' + e.message);
      }
    }

    async function loadFavorites() {
      try {
        const res  = await fetch(`${API}/favorites`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur favoris');

        const list = Array.isArray(data) ? data : [];
        const el   = document.getElementById('fav-list');

        if (!list.length) {
          el.innerHTML = '<p class="empty-msg">Aucun favori pour l\'instant.</p>';
          return;
        }

        el.innerHTML = '';
        list.forEach(fav => {
          const thumb = fav.poster_path
            ? `<img class="fav-thumb" src="${IMG}${fav.poster_path}" alt="${esc(fav.title)}">`
            : `<img class="fav-thumb" src="https://placehold.co/36x54/1a1a1a/666?text=N/A" alt="">`;

          const item = document.createElement('div');
          item.className = 'fav-item';
          item.innerHTML = `
            ${thumb}
            <div class="fav-info">
              <div class="fav-title">${esc(fav.title)}</div>
              <div class="fav-year">${fav.year || '—'}</div>
            </div>
            <button class="btn-remove" onclick="removeFavorite(${fav.id})">✕</button>
          `;
          el.appendChild(item);
        });

      } catch (e) {
        document.getElementById('fav-list').innerHTML = '<p class="empty-msg">Impossible de charger les favoris.</p>';
      }
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escJs(str) {
      return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    loadFavorites();
  </script>

</body>
</html>
